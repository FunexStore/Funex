<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order — Funex Studio</title>
  <meta name="description" content="Order page for Funex Studio projects." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script defer src="js/app.js"></script>
</head>
<body class="site-dark">
  <header class="site-header">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <img src="images/logos/logo.svg" alt="Funex Studio logo" class="logo-svg">
        <span class="brand-text">FUNEX STUDIO</span>
      </a>
      <nav class="main-nav">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="portfolio.html">Portfolio</a></li>
          <li><a href="pricing.html">Pricing</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="faq.html">FAQ</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="nav-cta">
        <a href="order.html" class="btn btn-accent">Start Project</a>
      </div>
    </div>
  </header>

  <main>
    <section class="section hero-sm container">
      <h1 class="section-title">Order a Project</h1>
      <p class="section-sub">Complete the form below to initiate your project. We'll reply with a quote and next steps.</p>
    </section>

    <section class="section container">
      <form id="order-form" class="order-form" method="get" action="thank-you.html" novalidate>
        <div class="form-grid">
          <label>
            <span>Name</span>
            <input name="name" type="text" required>
          </label>

          <label>
            <span>Email</span>
            <input name="email" type="email" required>
          </label>

          <label>
            <span>WhatsApp</span>
            <input name="whatsapp" type="tel" placeholder="+917023551413" required>
          </label>

          <label>
            <span>Project Type</span>
            <select name="project_type" required>
              <option value="">Choose a type</option>
              <option>Music Video Editing</option>
              <option>YouTube Video Editing</option>
              <option>Reels & Shorts Editing</option>
              <option>Podcast Editing</option>
              <option>Commercial Ads</option>
              <option>Color Grading</option>
            </select>
          </label>

          <label>
            <span>Duration</span>
            <input name="duration" type="text" placeholder="e.g. 3:45 or 00:05:00">
          </label>

          <label>
            <span>Reference Links</span>
            <input name="refs" type="url" placeholder="https://">
          </label>

          <label>
            <span>Deadline</span>
            <input name="deadline" type="date">
          </label>

          <label>
            <span>Budget (₹)</span>
            <input name="budget" type="number" min="0">
          </label>

          <label class="full">
            <span>Additional Notes</span>
            <textarea name="notes" rows="6"></textarea>
          </label>
        </div>

        <div class="form-actions">
          <button class="btn btn-accent" type="submit">Place Order</button>
        </div>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">
        <img src="images/logos/logo.svg" alt="Logo" class="logo-svg">
        <div class="brand-text-compact"><strong>FUNEX STUDIO</strong></div>
      </div>

      <nav class="footer-nav">
        <a href="index.html">Home</a>
        <a href="contact.html">Contact</a>
      </nav>

      <div class="footer-legal">
        <a href="privacy-policy.html">Privacy Policy</a>
        <p class="copyright">© <span id="year-8"></span> Funex Studio</p>
      </div>
    </div>
  </footer>
</body>
</html>
